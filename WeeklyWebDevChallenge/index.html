<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>String Calculator</title>
    <link rel="stylesheet" href="index.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Karla&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="main-container">
      <input id="equation-field" placeholder="3 + 3" />
      <button id="solve-button">Solve</button>
      <h3 id="solution-display"></h3>

      <br />
      <h4>Instructions:</h4>
      <ul>
        <li>
          Enter an equation with or without spaces. (80 / 2 * 5 + 25 / 5 or
          80/2*5+25/5)
        </li>
        <li>
          The app does not handle parentheses, if you'd like this feature send
          $9.99 to me!
        </li>
      </ul>

      <p>By Ted S.</p>
    </div>

    <script src="index.js"></script>
  </body>
</html>
