<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Shot Tracker</title>

    <style>
      html,
      body,
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        padding: 10px;
        width: 375px;
        height: 667px;
      }

      h1 {
        text-align: center;
        margin-bottom: 10px;
      }

      button {
        width: 100%;
        height: 40px;
        margin-bottom: 1em;
        border: none;
        border-radius: 5px;
        background: #1fa51f;
        color: white;
        font-size: 20px;
      }

      .measurement {
        /* display: inline-block; */
        width: 135px;
        margin: 20px auto;
      }

      #test {
        margin: 20px 0 20px 0;
        border: 1px solid green;
      }
    </style>
  </head>
  <body>
    <h1>Ted Tracker</h1>

    <button id="track">MARK</button>

    <h2>Distance: <span id="distance"></span></h2>

    <div class="measurement">
      <input type="radio" id="yards" name="units" checked />
      <label for="yards">Yards</label>

      <input type="radio" id="meters" name="units" />
      <label for="meters">Meters</label>
    </div>

    <script>
      let tracking = false;
      let gotInitialCoords = false;
      let watchID;
      let display = document.getElementById('distance');
      let msg = '';

      let x1 = (y1 = null); // initial coords
      let x2 = (y2 = null); // walking coords

      let units = 'yards';

      // geoloaction options
      let options = {
        enableHighAccuracy: true,
        timeout: 30000,
        maximumAge: 27000,
      };

      function error(err) {
        // Geolocation error
        console.warn(`ERROR(${err.code}): ${err.message}`);
      }

      function walking(position) {
        // mark is on...
        if (!gotInitialCoords) {
          x1 = position.coords.latitude;
          y1 = position.coords.logitude;
          gotInitialCoords = true;
          display.innerText = 0;
        }

        x2 = position.coords.latitude;
        y2 = position.coords.logitude;

        calculateDistance();
      }

      // button click to start tracking distance
      let track = document.getElementById('track');
      track.addEventListener(
        'click',
        function () {
          tracking = !tracking; //toggle

          if (tracking) {
            track.style.backgroundColor = 'orange';
            watchID = navigator.geolocation.watchPosition(walking);
            console.log(watchID);
          } else {
            gotInitialCoords = false;
            x1 = y1 = null;
            track.style.backgroundColor = 'green';
            navigator.geolocation.clearWatch(watchID);
            console.log(`Watch #${watchID} was cancelled!`);
          }

          if (document.getElementById('yards').checked) {
            units = ' Yards';
          } else {
            units = ' Meters';
          }
        },
        false
      );

      function calculateDistance() {
        let distance = 0;

        distance = getDistanceInMeters(x1, y1, x2, y2);

        if (units === ' Yards') {
          distance = distance * 1.09361;
        }

        display.innerHTML = distance.toFixed(1) + units;
      }

      function getDistanceInMeters(lat1, lon1, lat2, lon2) {
        // generally used geo measurement function
        let R = 6378.137; // Radius of earth in KM
        let dLat = (lat2 * Math.PI) / 180 - (lat1 * Math.PI) / 180;
        let dLon = (lon2 * Math.PI) / 180 - (lon1 * Math.PI) / 180;
        let a =
          Math.sin(dLat / 2) * Math.sin(dLat / 2) +
          Math.cos((lat1 * Math.PI) / 180) *
            Math.cos((lat2 * Math.PI) / 180) *
            Math.sin(dLon / 2) *
            Math.sin(dLon / 2);
        let c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        let d = R * c;
        return d * 1000; // meters
      }
    </script>
  </body>
</html>
