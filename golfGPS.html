<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Shot Tracker</title>

    <style>
      html,
      body,
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        padding: 10px 5% 0 5%;
        max-width: 500px;
        margin: 0 auto;
      }
      h1 {
        text-align: center;
      }

      .clearfix::after {
        content: '';
        clear: both;
        display: table;
      }

      button {
        width: 100%;
        height: 40px;
        margin-bottom: 1em;
        border: none;
        border-radius: 5px;
        background: #1fa51f;
        color: white;
        font-size: 20px;
      }

      .measurement {
        /* display: inline-block; */
        width: 135px;
        margin: 20px auto;
      }

      #test {
        margin: 20px 0 20px 0;
        border: 1px solid green;
      }
    </style>
  </head>
  <body>
    <h1>Ted's Tracker</h1>

    <button id="track">MARK</button>
    <button id="stop">STOP</button>

    <h2>Distance: <span id="distance"></span></h2>

    <form class="measurement clearfix">
      <div class="measurement">
        <input type="radio" id="yards" name="units" checked />
        <label for="yards">Yards</label>

        <input type="radio" id="meters" name="units" />
        <label for="meters">Meters</label>
      </div>
    </form>

    <!-- <p id="testing">testing</p> -->
    <p name="test" id="test" cols="45" rows="20"></p>

    <script>
      let tracking = false;
      let display = document.getElementById('distance');
      let myTimer = null;
      let msg = '';

      let x1 = null,
        y1 = null; // initial coords
      let x2 = null,
        y2 = null; // current coords
      let units = 'yards';

      let options = {
        // geoloaction options
        enableHighAccuracy: true,
        timeout: 30000,
        maximumAge: 27000,
      };

      function initial(pos) {
        let crd = pos.coords;

        x1 = crd.latitude;
        y1 = crd.longitude;

        msg = `X0: ${x1}
        Y0: ${y1}
        Accuracy: ${crd.accuracy}<br>`;

        document.getElementById('test').innerHTML = msg;
      }

      function walking(pos) {
        let crd = pos.coords;

        x2 = crd.latitude;
        y2 = crd.longitude;

        msg += `X: ${x2}
                Y: ${y2}
                Accuracy: ${crd.accuracy}<br>`;

        // document.getElementById('test').innerHTML = msg;
      }

      function final(pos) {
        let crd = pos.coords;

        x2 = crd.latitude;
        y2 = crd.longitude;

        msg += `Xf: ${x2}
                Yf: ${y2}
                Accuracy: ${crd.accuracy}`;

        document.getElementById('test').innerHTML = msg;
      }

      // ***

          setTimeout(() => {

          }, 2000);

        } else {  // walking now...

          x2 = crd.latitude;
          y2 = crd.longitude;

          // testing

          document.getElementById('testing').innerHTML = msg;

          // testing
          // console.log('Initail x2: ' + x2);
          // console.log('Initail y2: ' + y2);
        }
      }
*/

      function error(err) {
        // Geolocation error
        console.warn(`ERROR(${err.code}): ${err.message}`);
      }

      // button click to start tracking distance
      let track = document.getElementById('track');
      track.addEventListener(
        'click',
        function () {
          navigator.geolocation.getCurrentPosition(initial, error, options);

          const watcher = navigator.geolocation.watchPosition(walking);

          setTimeout(() => {
            navigator.geolocation.clearWatch(watcher);
          }, 5000);

          navigator.geolocation.getCurrentPosition(final, error, options);

          // document.getElementById('test').value = msg;
        },
        false
      );

      // let stop = document.getElementById('stop');

      function calculateDistance() {
        let distance = 0;

        if (x2 === null && y2 === null) {
          document.getElementById('distance').innerHTML = 0;
        }

        // navigator.geolocation.getCurrentPosition(success, error, options);

        distance = getDistanceInMeters(x1, y1, x2, y2);

        if (units === ' Yards') {
          distance = distance * 1.09361;
        }

        document.getElementById('distance').innerHTML =
          distance.toFixed(1) + units;
      }

      //   let dLat = deg2rad(x2 - x1);  // deg2rad below

      //     Math.sin(dLon / 2) * Math.sin(dLon / 2);

      //   let c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      //   let d = R * c; // Distance in m
      //   return d;
      // }

      function getDistanceInMeters(lat1, lon1, lat2, lon2) {
        // generally used geo measurement function
        let R = 6378.137; // Radius of earth in KM
        let dLat = (lat2 * Math.PI) / 180 - (lat1 * Math.PI) / 180;
        let dLon = (lon2 * Math.PI) / 180 - (lon1 * Math.PI) / 180;
        let a =
          Math.sin(dLat / 2) * Math.sin(dLat / 2) +
          Math.cos((lat1 * Math.PI) / 180) *
            Math.cos((lat2 * Math.PI) / 180) *
            Math.sin(dLon / 2) *
            Math.sin(dLon / 2);
        let c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        let d = R * c;
        return d * 1000; // meters
      }
