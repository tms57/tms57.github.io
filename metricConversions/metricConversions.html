    <div class="courseSubHead">
      <h3>Try</h3>
    </div>

    <div class="metricForm">
      <div class="From-Form">
        <div class="labels">
          <label for="metricFrom">From</label>
        </div>

        <input
          type="text"
          id="metricFrom"
          placeholder="number"
          name="metricFr"
        />

        <select id="fromPrefix">
          <option>Select a prefix</option>
          <option>u (micro)</option>
          <option>m (milli)</option>
          <option>c (centi)</option>
          <option>d (deci)</option>
          <option>-- (base)</option>
          <option>da (deca)</option>
          <option>h (hecto)</option>
          <option>k (kilo)</option>
          <option>M (Mega)</option>
          <option>G (Giga)</option>
        </select>

        <select id="baseUnit">
          <option>Select a base unit</option>
          <option>s (seconds)</option>
          <option>L (Litres)</option>
          <option>m (metres)</option>
          <option>g (grams)</option>
        </select>
      </div>
      <!-- END From-Form -->

      <div class="To-Form">
        <div class="labels">
          <label>To</label>
        </div>

        <select id="toPrefix">
          <option>Select a prefix</option>
          <option>u (micro)</option>
          <option>m (milli)</option>
          <option>c (centi)</option>
          <option>d (deci)</option>
          <option>-- (base)</option>
          <option>da (deca)</option>
          <option>h (hecto)</option>
          <option>k (kilo)</option>
          <option>M (Mega)</option>
          <option>G (Giga)</option>
        </select>

        <button type="button" id="convert">Convert</button>
      </div>
      <!-- END To-Form -->

      <div class="calcAndShow">
        <div class="labels">
          <label>Result</label>
        </div>

        <div class="result">
          <p id="metricToMetricResult">&nbsp;</p>
        </div>

        <button type="button" id="clear">Clear</button>
      </div>
      <!-- end of calcAndShow -->
    </div>
    <!-- end of metric form -->

    <script src="./LessonJS/metricToMetric.js"></script>
  </body>
